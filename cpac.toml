# CPAC Package Definition — Ember Browser
# The Cinder Project
#
# This file defines how CPAC fetches, verifies, and builds Ember.
# CPAC handles source checksum verification and reproducible builds
# on the user's machine.

[package]
name = "ember-browser"
version = "0.1.0"
description = "Privacy-focused, customizable Chromium-based browser"
maintainer = "The Cinder Project"
license = "BSD-3-Clause"
homepage = "https://github.com/SabeeirSharrma/Ember-Browser"
repository = "https://github.com/SabeeirSharrma/Ember-Browser"

# Source configuration
[source]
type = "git"
url = "https://github.com/SabeeirSharrma/Ember-Browser.git"
tag = "v0.1.0"
# Checksum verified against git signed tags

# Build configuration
[build]
system = "gn-ninja"
build_script = "build.sh"
build_args = ["--all"]

# Dependencies — declared, not vendored
# CinderBlock and Coalbox are separate CPAC packages
# Ember declares minimum compatible versions
[dependencies]
# CinderBlock >= 0.1.0  # Not required for v0.1 (added in v0.3)
# Coalbox >= 0.1.0       # Not required for v0.1 (added in v0.9)

# Build prerequisites
[build_prerequisites]
packages = [
    "git",
    "python3",
    "clang",
    "lld",
    "ninja",
    "nodejs",       # For depot_tools
    "glib2-devel",  # Linux only
    "gtk3-devel",   # Linux only
    "nss-devel",    # Linux only
]

# Platform-specific notes
[platform.linux]
arch = ["x86_64", "aarch64"]
sysroot = true
notes = "Uses Chromium's bundled sysroot for reproducibility"

# Install configuration
[install]
binary = "out/Default/chrome"
prefix = "/usr"
desktop_file = "ember.desktop"
icon = "ember/icons/icon_256.png"

# Verification
[verification]
# Network audit required before first release
# Confirm no outbound connections to Google, telemetry, or tracking endpoints
audit_required = true
audit_script = "scripts/network-audit.sh"
